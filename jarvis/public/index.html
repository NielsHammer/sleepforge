<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — SleepForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="jarvis.css">
</head>
<body>

  <canvas id="particles-canvas"></canvas>
  <div id="scan-line"></div>

  <!-- ═══ HUD TOP ═══ -->
  <header id="hud">
    <div class="hud-group">
      <div class="hud-logo">JARVIS</div>
      <div class="hud-sep"></div>
      <div class="hud-item">
        <div class="hud-val mono" id="clock-bkk">--:--:--</div>
        <div class="hud-lbl">BANGKOK</div>
      </div>
    </div>
    <div class="hud-group">
      <div class="hud-item">
        <div class="hud-val mono" id="cpu-val">--</div>
        <div class="hud-lbl">CPU%</div>
      </div>
      <div class="hud-item">
        <div class="hud-val mono" id="gpu-val">--</div>
        <div class="hud-lbl">GPU%</div>
      </div>
      <div class="hud-item">
        <div class="hud-val mono" id="vram-val">--</div>
        <div class="hud-lbl">VRAM</div>
      </div>
      <div class="hud-sep"></div>
      <div class="hud-item status-item">
        <div class="hud-dot" id="dot-tts"></div>
        <div class="hud-lbl">TTS</div>
      </div>
      <div class="hud-item status-item">
        <div class="hud-dot" id="dot-fal"></div>
        <div class="hud-lbl">FAL</div>
      </div>
      <div class="hud-item status-item">
        <div class="hud-dot" id="dot-yt"></div>
        <div class="hud-lbl">YT</div>
      </div>
      <div class="hud-sep"></div>
      <div class="hud-item">
        <div class="hud-val mono" id="render-count">0</div>
        <div class="hud-lbl">RENDERS</div>
      </div>
    </div>
  </header>

  <!-- ═══ MAIN ARENA ═══ -->
  <main id="arena">

    <div class="arena-row" id="arena-row">
      <!-- Orbital ellipse track (decorative) -->
      <div id="orbit-track"></div>

      <!-- CHANNEL CARD: ASTRONOMER -->
      <div class="orbital-card card-astro" id="card-astro" onclick="openChannel('astronomer')">
        <div class="cc tl"></div><div class="cc tr"></div>
        <div class="cc bl"></div><div class="cc br"></div>
        <div class="card-loading">SCANNING…</div>
      </div>

      <!-- HOLOGRAPHIC CORE -->
      <div id="core">
        <div class="ripple-host" id="ripple-host"></div>
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring r4"></div>
        <div class="ring r5"></div>
        <div class="ring r6"></div>
        <div class="core-inner">
          <div class="core-glow"></div>
          <div class="core-center">
            <div class="core-sweep"></div>
            <div class="cross-h"></div>
            <div class="cross-v"></div>
            <div class="core-letter">J</div>
          </div>
          <div class="tick-dot" style="--ang:0deg"></div>
          <div class="tick-dot" style="--ang:90deg"></div>
          <div class="tick-dot" style="--ang:180deg"></div>
          <div class="tick-dot" style="--ang:270deg"></div>
        </div>
        <div id="core-status-wrap">
          <div class="cs-eyebrow">SYSTEM</div>
          <div id="core-status" class="cs-text">STANDING BY</div>
        </div>
      </div>

      <!-- CHANNEL CARD: PHILOSOPHERS -->
      <div class="orbital-card card-phil" id="card-phil" onclick="openChannel('philosophers')">
        <div class="cc tl"></div><div class="cc tr"></div>
        <div class="cc bl"></div><div class="cc br"></div>
        <div class="card-loading">SCANNING…</div>
      </div>
    </div>

    <!-- COMMAND INPUT -->
    <div id="command-area">
      <div id="command-box">
        <div class="cc tl"></div><div class="cc tr"></div>
        <div class="cc bl"></div><div class="cc br"></div>
        <span class="cmd-prompt">▶</span>
        <input type="text" id="command-input" placeholder="Tell JARVIS what to do…" autocomplete="off" spellcheck="false">
        <button id="cmd-mic" title="Voice input">MIC</button>
        <button id="cmd-send">EXECUTE</button>
      </div>
      <div id="command-tags">
        <span class="cmd-tag" onclick="fillCmd('Show Astronomer analytics')">ASTRONOMER ANALYTICS</span>
        <span class="cmd-tag" onclick="fillCmd('Show philosophers queue')">PHILOSOPHERS QUEUE</span>
        <span class="cmd-tag" onclick="fillCmd('Run thumbnail test')">THUMBNAIL TEST</span>
        <span class="cmd-tag" onclick="fillCmd('System status')">SYSTEM STATUS</span>
        <span class="cmd-tag" onclick="fillCmd('Queue a video')">QUEUE VIDEO</span>
      </div>
    </div>

    <!-- RESPONSE PANEL -->
    <div id="response-panel" class="hidden">
      <div class="cc tl"></div><div class="cc tr"></div>
      <div class="cc bl"></div><div class="cc br"></div>
      <div id="response-title" class="resp-title">—</div>
      <div id="response-body" class="resp-body"></div>
    </div>

  </main>

  <!-- ═══ CHANNEL DETAIL OVERLAY ═══ -->
  <div id="channel-overlay" class="hidden" onclick="if(event.target===this)closeChannel()">
    <div id="channel-detail-wrap">
      <div class="cc tl lg"></div><div class="cc tr lg"></div>
      <div class="cc bl lg"></div><div class="cc br lg"></div>
      <button id="overlay-close" onclick="closeChannel()">[ CLOSE ]</button>
      <div id="channel-detail-content"></div>
    </div>
  </div>

  <script src="jarvis.js"></script>
</body>
</html>
